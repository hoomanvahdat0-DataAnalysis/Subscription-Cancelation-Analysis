        - type: paragraph
          children:
            - text: ""
        - type: paragraph
          children:
            - text: "The dataset under analysis comes from a software-as-a-service (SaaS) company that offers subscription-based products with recurring renewals. When customers cancel their subscriptions, they are required to select at least one reason, with the option to choose up to three. However, it is reasonable to assume that many dissatisfied users prefer to complete the cancellation process quickly and may not take the time to select multiple reasons. "
        - type: paragraph
          children:
            - text: "The company is facing a customer retention problem, as a significant number of users choose not to renew their subscriptions. The goal of the analysis is to identify the factors contributing to this higher-than-expected churn rate. To address this, data analysis tools—such as SQL—are used to examine cancellation patterns, including the most frequently cited reasons and any emerging trends. "
        - type: paragraph
          children:
            - text: ""
